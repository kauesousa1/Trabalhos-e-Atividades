<!DOCTYPE html>

<body>
        <h1>4 - Faça um algoritmo que calcule e escreva a média aritmética dos números inteiros entre 15 (inclusive) e 100 (inclusive).</h1>
    <script>


        let soma = 0;
        let quantidade = 85;

        for ( let i = 15; i <= 100; i++){
            soma += i;
        }

        let media = soma / quantidade;
        document.write("A média aritimetica é de: " + media.toFixed(2));


    </script>

</body>
</html>
