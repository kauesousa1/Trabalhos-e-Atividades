<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 23</title>
</head>
<body>

    <script>

        let contador = 0;
        let contador2 = 0;
        let contador3 = 0;

        for ( let i = 1; i <=20; i++) {
            let numero = parseInt(prompt("Digite o " + i + "º numero"));
        

        if (numero >= 0 && numero <= 100){
            contador++
        }else if (numero >= 101 && numero <= 200){
            contador2++
        }else if (numero > 200) {
            contador3++
        }
    }
            
document.write("quantidade de numeros de 0 entre 100: " + contador + "<br>");
document.write("quantidade de numeros de 101 entre 200: " + contador2 + "<br>");
document.write("quantidade de numeros maiores que 200: " + contador3);

    </script>
    
</body>
</html>
