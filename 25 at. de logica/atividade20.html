<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 20</title>
</head>
<body>

    <script>
        let maiores = 0

        for ( i = 1; i <= 20; i++) {
            let nume = parseInt(prompt("digite deu numero" + i));

            if(nume > 8) {
                maiores++;
            }
        }

        document.write("Tem exatamente " + maiores + " maiores que 8!")
    </script>
    
</body>
</html>
