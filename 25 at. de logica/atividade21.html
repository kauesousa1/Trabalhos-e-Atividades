<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 21</title>
</head>
<body>
    <h1> 21- A Loja Mamão com Açúcar está vendendo seus produtos em 5 (cinco) prestações sem
juros. Faça um programa que receba um valor de uma compra e mostre o valor das
prestações.
</h1>
    <script>
        let prodrutos = parseFloat(prompt("Digite o valor da compra: "));

        let prestacao = prodrutos / 5;

        document.write("O valor a cada prestação é de: R$ " + prestacao.toFixed(2));

    </script>
    
</body>
</html>
