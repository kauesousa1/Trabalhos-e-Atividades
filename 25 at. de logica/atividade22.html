<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade 22</title>
</head>
<body>

    <script>

         let contador = 0;

        for (let i = 1; i <=20; i++ ) {
            let numero = parseInt(prompt("Digite o " + i + "º numero: "));

            if (numero >= 0 && numero <= 100){
                contador++;
            }
        }

        document.write("Quantidade de numeros entre 0 e 100: " + contador)
    </script>
    
</body>
</html>
