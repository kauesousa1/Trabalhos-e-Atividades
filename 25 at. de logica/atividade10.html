<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade 10</title>
</head>
<body>

    <script>
        let saldo = parseFloat(prompt("Informe seu saldo: "))
        document.write("Seu saldo: " + saldo)

        let saldo2 = saldo * 1.015

        document.write("<br>saldo com reajuste: " + saldo2.toFixed(2));

        
    </script>
    
</body>
</html>
