<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade17</title>
</head>
<body>

    <script>
        let maiores = 0

        for ( i = 1; i <= 20; i++) {
            let idade = parseInt(prompt("Digite sua idade: " + i + "ª pessoa: "));

            if (idade >= 18){
                maiores++; // maiores = maiores + 1 
                // Imagine que você está contando quantas pessoas têm 18 anos ou mais.// Toda vez que alguém disser uma idade 18 ou maior, você fala: “Achei mais um!” E aumenta 1 no seu contador.É isso que o maiores++ faz.
            }

        }
        
    document.write("Quantas pessoas maiores de idade acessaram o site? " + maiores);
        

        
    </script>
    
</body>
</html>
