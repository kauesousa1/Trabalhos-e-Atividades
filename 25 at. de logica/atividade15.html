<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 15</title>
</head>
<body>

    <script>
        let soma = 0;

        for (let contador = 1;  contador <= 20; contador++) {
            let idade = parseInt(prompt("Digite a idade da " + "segunda pessoa:"));
            soma+= idade;
        }

        document.write("A soma das idades das 20 pessoas é: " + soma);

    </script>
    
</body>
</html>
