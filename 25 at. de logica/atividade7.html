</head>
<body>
    
    <script>
        let soma = (8 + 9 + 7) / 3;
        let soma2 = (4 + 5 + 6) / 3;

        document.write("Resultado da Primeira média: " + soma)
        document.write("<br> Resultado da Segunda média: " + soma2)

        let media3 = (soma + soma2) / 2

        document.write("<br> Resultado da média das médias: " + media3)

        let soma3 = (soma + soma2)
        document.write("<br> Resultado da soma das médias: " + soma3)

    </script>



</body>
