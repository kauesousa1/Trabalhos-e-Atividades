<!DOCTYPE html>
<html lang="pt-br ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 6</title>
</head>
<body>

    <h1>Atividade 6</h1>

    <script>
        
        let numero = parseInt(prompt("coloque um numero!"));
        
        let sucessor = numero + 1;
        let antecessor = numero - 1;


        document.write(" <br> O numero escolhido foi: " + numero);
        document.write(" <br> O sucessor do numero é: " + sucessor);
        document.write(" <br> O antecessor do numero é: " + antecessor);

    </script>
    
</body>
</html>
