<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numero divisivel</title>
</head>
<body>
    <!-- <h1>Número divísivel</h1> -->

    <script>

        let numero = parseInt(prompt("Informe seu numero: "));
        let resultado = '';

        if (numero % 10 === 0) {
            resultado = ("o numero é divisivel por 10: ");

        } else if (numero % 5 === 0) {
            resultado = ("o numero é divisivel por 5: ");
    
        } else if(numero % 2 === 0) {
            resultado = ("o numero é divisivel por 2: ");
        }else {
            resultado = (" não é divisivel nem por 10, 5, 2 nem por ");
        }   

        alert(resultado);
        
        
        


       






    </script>
    
</body>
</html>
