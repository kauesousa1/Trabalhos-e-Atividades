<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade 19</title>
</head>
<body>

        <script>
            let cotacao = parseFloat(prompt("Digite a cotação do dólar (ex: 5.20): "));
            let dolares = parseFloat(prompt("Digite quantos dólares você tem: "));

            let valorEmReais = dolares * cotacao;

            document.write("Valor em reais: R$ " + valorEmReais.toFixed(2));
        </script>
    
</body>
</html>
