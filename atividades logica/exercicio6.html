<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6 JS </title>
</head>
<body>
    <script>
        
        let numero = parseFloat(prompt(" Numero inserido: " )) // parsefloat é para converter a string em numero, se eu não usar ele, o resultado da soma vai ser uma concatenação de string, ou seja, se eu inserir 5, o resultado da soma vai ser 55, e não 10.
        

        let sucessor = numero + 1
        let antecessor = numero - 1 

        document.write(" <br> Sucessor: " + sucessor) 
        document.write(" <br> Antecessor: " + antecessor)

    </script>
</body>
</html>
