    <title>exerceio 2 de logica</title>
</head>
<body>
    

    <script>
        let media1 = (8 + 9 + 7) / 3;
        let media2 = (4 + 5 + 6) / 3;

        document.write(" Total da primeira media "  + media1)
        document.write(" <br> Total segunda meida " + media2)
        
        let media3 = (media1 + media2) / 2 

        document.write(" <br> Media das duas medias " + media3)

        let soma = media1 + media2

        document.write(" <br> Soma das duas medias " + soma)
        
    </script>



</body>
