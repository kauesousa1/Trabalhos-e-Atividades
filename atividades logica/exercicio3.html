<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio Saldo JS</title>
</head>
<body>

    <script>
     let valor = prompt("Insira um valor: ")
    document.write("Valor inserido: " + valor)

    let valor2 = valor * 1.01
    document.write(" <br>Valor reajustado para 1%: " + valor2)

    </script>
    
</body>
