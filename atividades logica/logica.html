<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ler a idade expressa em anos</title>
</head>
<body>


    <script>
        let anos = Number(prompt("entre com seus anos"))
        let meses = Number(prompt("entre com seus meses"))
        let dias = Number(prompt("entre com seus dias"))

        let totalDias = (anos * 365) + (meses * 30) + dias

        document.write("Total em dias: " + totalDias)
        

    </script>
    
</body>
</html>
